services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: sutradharadb
      POSTGRES_USER: sutradhara
      POSTGRES_PASSWORD: sutradharapassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
    environment:
      - DATABASE_URL=postgresql+asyncpg://sutradhara:sutradharapassword@db/sutradharadb
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
